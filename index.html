<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Football Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: linear-gradient(150deg, #1e60b0 0%, #0e3474 45%, #071a40 100%);
  font-family: 'Barlow Condensed', sans-serif;
  color: #fff;
}

.root {
  width: 100vw; height: 100vh;
  padding: 14px;
  display: grid;
  grid-template-columns: 1fr 190px;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
}

.left-col {
  grid-column: 1; grid-row: 1 / 3;
  display: grid; grid-template-rows: 1fr 1fr; gap: 12px;
}
.sidebar { grid-column: 2; grid-row: 1 / 3; display: flex; flex-direction: column; }

.slabel {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(0.65rem, 1vw, 0.9rem);
  letter-spacing: 3px; color: rgba(255,255,255,0.85);
  margin-bottom: 6px; text-transform: uppercase;
}
.slabel em { color: #f5c518; font-style: normal; }

/* ── GRID ── */
.grid-section { display: flex; flex-direction: column; }
.match-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 1;
}

.mcard {
  background: rgba(8,22,60,0.78); border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0; padding: 10px 8px 8px;
  cursor: pointer; transition: border-color .2s, transform .15s;
  position: relative; overflow: hidden;
}
.mcard:hover { border-color: rgba(255,255,255,0.22); transform: translateY(-2px); }
.mcard.focused { border-color: #f5c518; box-shadow: 0 0 0 2px #f5c518; }
.mcard.empty { justify-content: center; opacity: .4; cursor: default; }
.mcard.empty:hover { transform: none; border-color: rgba(255,255,255,0.08); }

.live-row {
  display: flex; align-items: center; gap: 5px;
  font-size: clamp(0.55rem, 0.8vw, 0.7rem); font-weight: 700; letter-spacing: 2px;
  color: rgba(255,255,255,0.5); margin-bottom: 4px;
}
.ldot {
  width: 6px; height: 6px; border-radius: 50%; background: #ff4d4d;
  animation: ldpulse 1.8s ease-in-out infinite;
}
@keyframes ldpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.65)} }

.mtime {
  position: absolute; top: 8px; right: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(0.6rem, 0.85vw, 0.8rem);
  background: rgba(0,0,0,0.65); border: 1px solid rgba(255,70,70,0.35); color: #ff6b6b;
  padding: 1px 8px; border-radius: 20px; letter-spacing: 1px;
  animation: tblink 4s ease-in-out infinite;
}
.mleague {
  position: absolute; top: 8px; left: 10px;
  font-size: clamp(0.5rem, 0.65vw, 0.62rem); color: rgba(255,255,255,.4);
  font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
@keyframes tblink { 0%,100%{color:#ff4d4d;border-color:rgba(255,80,80,.4)} 50%{color:#ffaaaa;border-color:rgba(255,80,80,.1)} }

.card-sb {
  display: flex; align-items: center; justify-content: center;
  gap: clamp(6px,1.2vw,16px); width: 100%;
}
.cteam {
  display: flex; flex-direction: column; align-items: center;
  gap: 5px; width: clamp(55px,7vw,80px);
}
.cteam .lw {
  width: clamp(32px,4.2vw,52px); height: clamp(32px,4.2vw,52px);
  background: #fff; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,.5); overflow: hidden;
}
.cteam .lw img { width:100%; height:100%; object-fit:contain; }
.cteam .tname { font-size: clamp(0.6rem,0.82vw,0.8rem); font-weight:700; text-align:center; line-height:1.1; }
.cscore {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.5rem,2.8vw,2.6rem); letter-spacing:3px; flex-shrink:0; line-height:1;
}
.cnote { font-size: clamp(0.55rem,0.7vw,0.68rem); color:rgba(255,255,255,.5); font-style:italic; margin-top:2px; }

/* ── BOTTOM ── */
.bottom-row { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 10px; }

.focus-wrap, .preview-wrap { display: flex; flex-direction: column; }
.focus-card {
  flex: 1;
  background: linear-gradient(135deg,#7a1515 0%,#4a0b0b 50%,#200505 100%);
  border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 6px 28px rgba(0,0,0,.5);
  padding: clamp(8px,1.2vh,14px) clamp(10px,1.5vw,18px);
  display: flex; flex-direction: column; gap: clamp(6px,1vh,10px);
}
.focus-sb { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.fteam { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
.fteam .lw {
  width: clamp(38px,5vw,58px); height: clamp(38px,5vw,58px);
  background: #fff; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  padding: 5px; box-shadow: 0 2px 12px rgba(0,0,0,.6); overflow: hidden;
}
.fteam .lw img { width:100%; height:100%; object-fit:contain; }
.fteam .tname { font-family:'Bebas Neue',sans-serif; font-size:clamp(0.75rem,1.1vw,1.1rem); letter-spacing:1px; text-align:center; }
.fcenter { display:flex; flex-direction:column; align-items:center; gap:1px; flex-shrink:0; }
.fscore { font-family:'Bebas Neue',sans-serif; font-size:clamp(2rem,3.5vw,3.2rem); letter-spacing:4px; line-height:1; }
.ftime { font-family:'Bebas Neue',sans-serif; font-size:clamp(0.65rem,0.9vw,0.85rem); color:#ff6b6b; letter-spacing:2px; animation:tblink 4s ease-in-out infinite; }

.stats { display:flex; flex-direction:column; gap:4px; }
.srow { display:grid; grid-template-columns:42px 1fr 42px; align-items:center; gap:5px; }
.sv { font-size:clamp(0.65rem,0.85vw,0.82rem); font-weight:700; }
.sv.home { text-align:right; } .sv.away { text-align:left; }
.slbl { text-align:center; font-size:clamp(0.52rem,0.65vw,0.62rem); font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:rgba(255,255,255,.55); }
.sbar { height:3px; background:rgba(255,255,255,.12); border-radius:4px; overflow:hidden; margin-top:2px; }
.sbar-f { height:100%; border-radius:4px; background:linear-gradient(90deg,#d04040,#ff7777); }
.fnote { font-size:clamp(0.52rem,0.68vw,0.65rem); color:rgba(255,255,255,.5); font-style:italic; border-top:1px solid rgba(255,255,255,.1); padding-top:6px; line-height:1.4; }

.preview-card {
  flex:1; background:rgba(8,22,60,0.78); border-radius:16px;
  border:1px solid rgba(255,255,255,0.08); box-shadow:0 4px 20px rgba(0,0,0,.35);
  padding:clamp(8px,1.2vh,14px) clamp(10px,1.5vw,16px);
  display:flex; flex-direction:column; justify-content:center; gap:8px;
}
.prev-league { font-size:clamp(0.58rem,0.75vw,0.72rem); font-weight:700; letter-spacing:2px; color:#f5c518; text-transform:uppercase; }
.prev-sb { display:flex; align-items:center; justify-content:center; gap:14px; flex:1; }
.prev-team { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; }
.prev-team .lw { width:clamp(36px,4.8vw,54px); height:clamp(36px,4.8vw,54px); background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:4px; box-shadow:0 2px 10px rgba(0,0,0,.5); overflow:hidden; }
.prev-team .lw img { width:100%; height:100%; object-fit:contain; }
.prev-team .tname { font-size:clamp(0.65rem,0.85vw,0.82rem); font-weight:700; text-align:center; }
.prev-score { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.8rem,3vw,2.8rem); letter-spacing:3px; flex-shrink:0; }
.prev-lbl { font-size:clamp(0.52rem,0.68vw,0.65rem); color:rgba(255,255,255,.5); text-align:center; font-style:italic; }

/* ── SIDEBAR ── */
.sidebar-inner {
  flex:1; background:rgba(6,16,44,0.92); border-radius:16px;
  border:1px solid rgba(255,255,255,0.07); box-shadow:0 6px 28px rgba(0,0,0,.5);
  padding:10px 8px; display:flex; flex-direction:column; justify-content:space-around;
}
.tick { display:flex; flex-direction:column; align-items:center; padding:8px 6px 6px; border-radius:12px; cursor:pointer; transition:background .2s; position:relative; flex:1; }
.tick:hover { background:rgba(255,255,255,.06); }
.tick.active { background:rgba(255,255,255,.09); }
.tick + .tick { border-top:1px solid rgba(255,255,255,.06); }
.tick-time { font-family:'Bebas Neue',sans-serif; font-size:clamp(0.55rem,0.7vw,0.68rem); color:#ff6b6b; letter-spacing:1px; background:rgba(0,0,0,.5); padding:1px 7px; border-radius:8px; animation:tblink 4s ease-in-out infinite; margin-bottom:5px; }
.tick-row { display:flex; align-items:center; justify-content:space-between; width:100%; gap:4px; }
.tick-logo { width:clamp(26px,2.8vw,34px); height:clamp(26px,2.8vw,34px); background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:3px; overflow:hidden; flex-shrink:0; }
.tick-logo img { width:100%; height:100%; object-fit:contain; }
.tick-score { font-family:'Bebas Neue',sans-serif; font-size:clamp(1rem,1.4vw,1.25rem); letter-spacing:2px; text-align:center; flex-shrink:0; }

/* ── STATUS BAR ── */
.status-bar {
  position: fixed; bottom: 8px; right: 14px;
  font-size: 0.6rem; color: rgba(255,255,255,.3);
  letter-spacing: 1px; font-weight: 600;
}

/* ── LOADING / ERROR ── */
.overlay {
  position: fixed; inset: 0; background: rgba(7,26,64,0.92);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  z-index: 100;
}
.overlay.hidden { display: none; }
.spinner {
  width: 40px; height: 40px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,.1);
  border-top-color: #f5c518;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.overlay p { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:3px; color:rgba(255,255,255,.6); }
.overlay .err { color:#ff6b6b; font-size:0.8rem; letter-spacing:1px; max-width:300px; text-align:center; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p>Cargando partidos...</p>
</div>

<div class="root">
  <div class="left-col">

    <!-- TOP: THE GRID -->
    <div class="grid-section">
      <div class="slabel">THE GRID &nbsp;<em id="grid-count"></em></div>
      <div class="match-grid" id="match-grid">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- BOTTOM -->
    <div class="bottom-row">
      <div class="focus-wrap">
        <div class="slabel">MATCH FOCUS</div>
        <div class="focus-card" id="focus-card">
          <div class="focus-sb">
            <div class="fteam">
              <div class="lw"><img id="f-home-logo" src="" alt=""></div>
              <div class="tname" id="f-home-name">—</div>
            </div>
            <div class="fcenter">
              <div class="fscore" id="f-score">– : –</div>
              <div class="ftime" id="f-time">–'</div>
            </div>
            <div class="fteam">
              <div class="lw"><img id="f-away-logo" src="" alt=""></div>
              <div class="tname" id="f-away-name">—</div>
            </div>
          </div>
          <div class="stats" id="f-stats">
            <div class="srow">
              <div class="sv home" id="stat-poss-h">–</div>
              <div class="slbl">Ball Possession<div class="sbar"><div class="sbar-f" id="bar-poss" style="width:50%"></div></div></div>
              <div class="sv away" id="stat-poss-a">–</div>
            </div>
            <div class="srow">
              <div class="sv home" id="stat-shots-h">–</div>
              <div class="slbl">Shots on Target<div class="sbar"><div class="sbar-f" id="bar-shots" style="width:50%"></div></div></div>
              <div class="sv away" id="stat-shots-a">–</div>
            </div>
            <div class="srow">
              <div class="sv home" id="stat-fouls-h">–</div>
              <div class="slbl">Fouls<div class="sbar"><div class="sbar-f" id="bar-fouls" style="width:50%"></div></div></div>
              <div class="sv away" id="stat-fouls-a">–</div>
            </div>
          </div>
          <div class="fnote" id="f-note">Selecciona un partido para ver detalles.</div>
        </div>
      </div>

      <div class="preview-wrap">
        <div class="slabel" id="prev-label">SIGUIENTE PARTIDO</div>
        <div class="preview-card">
          <div class="prev-sb" id="prev-sb">
            <div class="prev-team">
              <div class="lw"><img id="p-home-logo" src="" alt=""></div>
              <div class="tname" id="p-home-name">—</div>
            </div>
            <div class="prev-score" id="p-score">– : –</div>
            <div class="prev-team">
              <div class="lw"><img id="p-away-logo" src="" alt=""></div>
              <div class="tname" id="p-away-name">—</div>
            </div>
          </div>
          <div class="prev-lbl" id="p-note">–</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="slabel">EN VIVO</div>
    <div class="sidebar-inner" id="sidebar">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<div class="status-bar" id="status-bar">Actualizando...</div>

<script>
// ── State ──
let matches = [];
let focusIndex = 0;

// ── Fetch from our serverless backend ──
async function fetchMatches() {
  try {
    const res = await fetch('/api/live');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    matches = data.matches || [];
    document.getElementById('status-bar').textContent =
      'Actualizado: ' + new Date(data.updated).toLocaleTimeString('es-ES');
    render();
    document.getElementById('overlay').classList.add('hidden');
  } catch (e) {
    console.error(e);
    // If no live matches or error, show demo message
    if (matches.length === 0) {
      document.getElementById('overlay').innerHTML =
        `<p>Sin partidos en vivo</p><div class="err">No hay partidos en directo ahora mismo. Vuelve durante la jornada.</div>`;
    }
  }
}

// ── Render all sections ──
function render() {
  if (matches.length === 0) return;

  // Clamp focusIndex
  if (focusIndex >= matches.length) focusIndex = 0;

  renderGrid();
  renderSidebar();
  renderFocus(focusIndex);
  renderPreview();
}

function logoImg(url, alt) {
  return url
    ? `<img src="${url}" alt="${alt}" onerror="this.style.opacity=0">`
    : `<span style="font-size:1.2rem">⚽</span>`;
}

// ── THE GRID (first 3 matches) ──
function renderGrid() {
  const grid = document.getElementById('match-grid');
  const gridMatches = matches.slice(0, 3);
  document.getElementById('grid-count').textContent =
    matches.length > 3 ? `+${matches.length - 3} más` : '';

  grid.innerHTML = gridMatches.map((m, i) => `
    <div class="mcard ${i === focusIndex ? 'focused' : ''}" onclick="selectMatch(${i})">
      <div class="live-row"><span class="ldot"></span>LIVE</div>
      <div class="mtime">${m.minute ? m.minute + "'" : m.status}</div>
      <div class="mleague">${m.league}</div>
      <div class="card-sb">
        <div class="cteam">
          <div class="lw">${logoImg(m.home.logo, m.home.name)}</div>
          <div class="tname">${shortName(m.home.name)}</div>
        </div>
        <div class="cscore">${m.home.score}–${m.away.score}</div>
        <div class="cteam">
          <div class="lw">${logoImg(m.away.logo, m.away.name)}</div>
          <div class="tname">${shortName(m.away.name)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

// ── SIDEBAR (all matches) ──
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = matches.map((m, i) => `
    <div class="tick ${i === focusIndex ? 'active' : ''}" onclick="selectMatch(${i})">
      <div class="tick-time">${m.minute ? m.minute + "'" : m.status}</div>
      <div class="tick-row">
        <div class="tick-logo">${logoImg(m.home.logo, m.home.name)}</div>
        <div class="tick-score">${m.home.score}–${m.away.score}</div>
        <div class="tick-logo">${logoImg(m.away.logo, m.away.name)}</div>
      </div>
    </div>
  `).join('');
}

// ── MATCH FOCUS ──
function renderFocus(i) {
  const m = matches[i];
  if (!m) return;

  document.getElementById('f-home-logo').src = m.home.logo || '';
  document.getElementById('f-home-name').textContent = m.home.name;
  document.getElementById('f-away-logo').src = m.away.logo || '';
  document.getElementById('f-away-name').textContent = m.away.name;
  document.getElementById('f-score').textContent = `${m.home.score} – ${m.away.score}`;
  document.getElementById('f-time').textContent = m.minute ? m.minute + "'" : m.status;
  document.getElementById('f-note').textContent = m.league;

  // Stats
  const hs = m.stats.home || {};
  const as = m.stats.away || {};

  const pHome = parseInt(hs['Ball Possession']) || 50;
  const pAway = parseInt(as['Ball Possession']) || 50;
  const shHome = parseInt(hs['Shots on Goal']) || 0;
  const shAway = parseInt(as['Shots on Goal']) || 0;
  const fHome = parseInt(hs['Fouls']) || 0;
  const fAway = parseInt(as['Fouls']) || 0;
  const totalSh = shHome + shAway || 1;
  const totalF = fHome + fAway || 1;

  document.getElementById('stat-poss-h').textContent = pHome + '%';
  document.getElementById('stat-poss-a').textContent = pAway + '%';
  document.getElementById('bar-poss').style.width = pHome + '%';

  document.getElementById('stat-shots-h').textContent = shHome;
  document.getElementById('stat-shots-a').textContent = shAway;
  document.getElementById('bar-shots').style.width = (shHome / totalSh * 100) + '%';

  document.getElementById('stat-fouls-h').textContent = fHome;
  document.getElementById('stat-fouls-a').textContent = fAway;
  document.getElementById('bar-fouls').style.width = (fHome / totalF * 100) + '%';
}

// ── PREVIEW (4th match or next) ──
function renderPreview() {
  const m = matches[3] || matches[matches.length - 1];
  if (!m) return;
  document.getElementById('p-home-logo').src = m.home.logo || '';
  document.getElementById('p-home-name').textContent = m.home.name;
  document.getElementById('p-away-logo').src = m.away.logo || '';
  document.getElementById('p-away-name').textContent = m.away.name;
  document.getElementById('p-score').textContent = `${m.home.score} – ${m.away.score}`;
  document.getElementById('p-note').textContent = m.league;
  document.getElementById('prev-label').innerHTML = `EN VIVO &nbsp;<em>${m.minute ? m.minute + "'" : ''}</em>`;
}

// ── Select match to focus ──
function selectMatch(i) {
  focusIndex = i;
  renderFocus(i);
  // Update active states
  document.querySelectorAll('.mcard').forEach((c, j) =>
    c.classList.toggle('focused', j === i));
  document.querySelectorAll('.tick').forEach((c, j) =>
    c.classList.toggle('active', j === i));
}

// ── Helpers ──
function shortName(name) {
  // Abbreviate long names for the grid cards
  const map = {
    'Manchester City': 'Man City',
    'Manchester United': 'Man Utd',
    'Borussia Dortmund': 'Dortmund',
    'FC Bayern München': 'Bayern',
    'Real Madrid': 'Real Madrid',
    'FC Barcelona': 'Barcelona',
    'Atletico Madrid': 'Atlético',
    'Inter Milan': 'Inter',
    'AC Milan': 'Milan',
    'Juventus': 'Juventus',
    'Paris Saint Germain': 'PSG',
  };
  return map[name] || (name.length > 12 ? name.slice(0, 11) + '…' : name);
}

// ── Init + polling every 60s ──
fetchMatches();
setInterval(fetchMatches, 60000);
</script>
</body>
</html>
